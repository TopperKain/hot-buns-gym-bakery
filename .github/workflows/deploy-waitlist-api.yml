name: Deploy Waitlist API

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-waitlist-api.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Build API
        run: npm run build
        working-directory: api

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: hot-buns-gym-waitlist-api2
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
