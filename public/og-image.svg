<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B2826" />
      <stop offset="100%" stop-color="#1f1c1a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97742" />
      <stop offset="100%" stop-color="#C94032" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <g transform="translate(120,110)">
    <rect width="960" height="410" rx="36" fill="#2f2b29" stroke="#D97742" stroke-opacity="0.4" stroke-width="4" />
    <text x="72" y="150" font-family="Montserrat,Arial,sans-serif" font-size="78" font-weight="800" fill="#F5EFE7">
